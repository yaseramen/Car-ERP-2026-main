<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.18"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <!-- دوائر تقنية -->
  <circle cx="280" cy="200" r="140" fill="none" stroke="#22d3ee" stroke-opacity="0.12" stroke-width="2"/>
  <circle cx="1320" cy="680" r="200" fill="none" stroke="#10b981" stroke-opacity="0.1" stroke-width="2"/>
  <!-- خطوط دارات -->
  <g stroke="#06b6d4" stroke-opacity="0.15" fill="none" stroke-width="1.5">
    <path d="M100 450 Q400 300 700 400 T1300 380"/>
    <path d="M200 720 L500 520 L900 600 L1200 400"/>
  </g>
  <!-- أيقونة محرك / تحذير تقني مبسّط -->
  <g transform="translate(180 320)" filter="url(#blur)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="#eab308" stroke-opacity="0.4"/>
    <text x="100" y="45" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="11" font-weight="700">CHECK ENGINE</text>
    <path d="M70 70 L100 55 L130 70 L130 95 L70 95 Z" fill="none" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.8"/>
  </g>
  <!-- نافذة واجهة برمجية مبسّطة -->
  <g transform="translate(1050 180)">
    <rect width="380" height="240" rx="10" fill="#1e293b" fill-opacity="0.55" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="380" height="36" rx="10" fill="#0f172a" fill-opacity="0.9"/>
    <circle cx="22" cy="18" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="42" cy="18" r="5" fill="#eab308" opacity="0.8"/>
    <circle cx="62" cy="18" r="5" fill="#22c55e" opacity="0.8"/>
    <text x="190" y="22" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">EFCT · OBD</text>
    <rect x="24" y="56" width="332" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="40" y="75" fill="#22d3ee" font-family="ui-monospace,monospace" font-size="11">P0420 · P0171</text>
    <rect x="24" y="100" width="160" height="12" rx="2" fill="#334155" opacity="0.6"/>
    <rect x="24" y="122" width="220" height="10" rx="2" fill="#334155" opacity="0.4"/>
    <rect x="24" y="142" width="180" height="10" rx="2" fill="#334155" opacity="0.4"/>
  </g>
  <!-- سهم نمو -->
  <g transform="translate(1180 520)">
    <path d="M0 80 L60 20 L120 80" fill="none" stroke="#22c55e" stroke-width="3" stroke-opacity="0.5"/>
    <text x="60" y="105" text-anchor="middle" fill="#4ade80" font-family="system-ui,sans-serif" font-size="13" font-weight="600" opacity="0.85">+</text>
  </g>
  <text x="800" y="860" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="14" letter-spacing="0.15em">EFCT</text>
</svg>
